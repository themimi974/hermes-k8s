# Re-uses the original hermes-basic middleware from the POC stack
# (defined in `auth` namespace as per the brief). Traefik label
# selectors resolve middlewares across namespaces.
# __DOMAIN__ and __TLS__ are substituted during deploy by the agent.
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: hermes-gateway-vanity
  namespace: auth
spec:
  entryPoints: [websecure]
  routes:
    - match: Host(`__DOMAIN__`)
      kind: Rule
      middlewares:
        - name: hermes-basic
          namespace: auth
      services:
        - name: gateway
          port: 80
  tls:
    __TLS__
