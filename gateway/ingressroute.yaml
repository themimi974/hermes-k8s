# __DOMAIN__ and __TLS__ are substituted during deploy by the agent.
# No auth middleware — single-node LAN deploy, Traefik/network boundary is sufficient.
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: hermes-gateway-vanity
  namespace: auth
spec:
  entryPoints: [websecure]
  routes:
    - match: Host(`__DOMAIN__`)
      kind: Rule
      services:
        - name: gateway
          port: 80
  tls:
    __TLS__
