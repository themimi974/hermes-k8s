  <text x="95" y="697" fill="#94a3b8" font-size="10">2Gi RWO local-path · mount: /opt/data</text>
  <text x="95" y="710" fill="#22c55e" font-size="9">⬆ Makes config survive pod restart (emptyDir does NOT)</text>

  <rect x="80" y="725" width="570" height="30" fill="#0f172a" stroke="#334155" stroke-width="1" rx="4"/>
