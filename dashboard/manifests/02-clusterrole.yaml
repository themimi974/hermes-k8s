apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: dashboard-manager
rules:
  - apiGroups: [""]
    resources:
      - namespaces
      - services
      - persistentvolumeclaims
      - secrets
      - configmaps
      - pods
      - resourcequotas
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["apps"]
    resources:
      - deployments
      - replicasets
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["batch"]
    resources:
      - jobs
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["traefik.io"]
    resources:
      - ingressroutes
      - middlewares
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
