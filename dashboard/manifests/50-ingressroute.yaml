apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: dashboard
  namespace: dashboard
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`dashboard.hermes.caron.fun`)
      kind: Rule
      middlewares:
        - name: hermes-basic
          namespace: auth
      services:
        - name: dashboard-frontend
          port: 80
  tls:
    certResolver: cfresolver
