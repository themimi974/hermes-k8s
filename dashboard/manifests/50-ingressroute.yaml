# No auth middleware — single-node LAN deploy.
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: dashboard
  namespace: dashboard
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`dashboard.__DOMAIN__`)
      kind: Rule
      services:
        - name: dashboard-frontend
          port: 80
  tls:
    __TLS__
