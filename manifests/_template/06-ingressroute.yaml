apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: vanity
  namespace: friend-__NAME__
spec:
  entryPoints: [websecure]
  routes:
    - match: Host(`__HOST__`)
      kind: Rule
      middlewares:
        - name: friend-basic
          namespace: friend-__NAME__
      services:
        - name: ttyd
          port: 7681
  tls:
    # __TLS__ is replaced during deploy based on TLS method:
    #   Let's Encrypt → certResolver: cfresolver
    #   Self-signed   → secretName: hermes-tls
    #   HTTP only     → remove tls section + change entryPoints to [web]
    __TLS__
