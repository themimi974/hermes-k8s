# Same credential value the POC had in auth/hermes-htpasswd, just relocated
# to the friend namespace (no rotation per brief). Regenerate via:
#   htpasswd -nbm -c /dev/stdout <user> <pass> | sed 's/^[^:]*://'
# then base64 the entire <user>:$apr1$... line (no trailing newline) into .data.users
apiVersion: v1
kind: Secret
type: Opaque
metadata:
  name: friend-htpasswd
  namespace: friend-cyprien-iov
data:
  users: REPLACE_WITH_BASE64_HTPASSWD
